<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cocina MOH</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh;font-size:14px}
/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#0d4db5,#1a6ef5)}
.lcard{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.2);text-align:center}
.llogo{font-size:48px;margin-bottom:8px}
.ltitle{color:white;font-size:22px;font-weight:700;margin-bottom:4px}
.lsub{color:rgba(255,255,255,0.8);font-size:13px;margin-bottom:24px}
.llbl{font-size:12px;font-weight:600;color:#6b7280;margin-bottom:6px;display:block;text-align:left}
.linp{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:12px;font-size:22px;text-align:center;letter-spacing:8px;font-weight:700;outline:none}
.linp:focus{border-color:#1a6ef5}
.lbtn{width:100%;padding:13px;background:#1a6ef5;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.lerr{color:#dc2626;font-size:12px;text-align:center;margin-top:8px;display:none}
/* APP SHELL */
#appScreen{display:none}
.hdr{color:white;padding:10px 14px 7px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.hdr-b{background:#1a6ef5}.hdr-d{background:#0d4db5}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.htitle{font-size:14px;font-weight:700}
.hsub{font-size:10px;opacity:0.8}
.wknav{display:flex;align-items:center;gap:4px}
.wkb{background:rgba(255,255,255,0.2);border:none;color:white;width:26px;height:26px;border-radius:7px;font-size:16px;cursor:pointer;line-height:1}
.wkl{font-size:10px;font-weight:600;min-width:128px;text-align:center;background:rgba(255,255,255,0.15);padding:4px 6px;border-radius:7px}
.outb{background:rgba(255,255,255,0.2);border:none;color:white;padding:4px 9px;border-radius:7px;font-size:11px;cursor:pointer}
.rlbl{background:rgba(255,255,255,0.22);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.sync{padding:4px 14px;font-size:11px;text-align:center;min-height:22px}
.sb{background:#0d4db5}.sd{background:#0a3d8f}
.sok{color:#86efac}.serr{color:#fca5a5}.sing{color:#fde68a}
/* TABS */
.tabs{display:flex;background:white;border-bottom:1px solid #e5e7eb;overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:52px;padding:8px 3px;font-size:10px;font-weight:600;color:#6b7280;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;text-align:center}
.tab.on{color:#0d4db5;border-bottom-color:#0d4db5}
/* DAY/MEAL */
.days{display:flex;gap:4px;padding:7px 10px;overflow-x:auto;background:white;border-bottom:1px solid #e5e7eb;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.db{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1.5px solid #e5e7eb;background:white;cursor:pointer;white-space:nowrap;color:#6b7280}
.db.on{background:#1a6ef5;border-color:#1a6ef5;color:white}
.mrow{display:flex;gap:4px;padding:5px 10px;background:#fafafa;border-bottom:1px solid #e5e7eb}
.mb{flex:1;padding:5px 2px;border-radius:7px;font-size:9px;font-weight:600;border:1.5px solid #e5e7eb;background:white;cursor:pointer;color:#6b7280;text-align:center;line-height:1.4}
.mb.on{background:#e8f0fe;border-color:#1a6ef5;color:#1a6ef5}
/* SEARCH */
.srch{padding:6px 10px;background:white;border-bottom:1px solid #e5e7eb}
.srch input{width:100%;padding:7px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:13px;background:#fafafa;outline:none}
.srch input:focus{border-color:#1a6ef5;background:white}
/* PRODUCT ROWS */
.colh{display:grid;gap:3px;padding:4px 10px;background:#f8f9fa;border-bottom:1px solid #e5e7eb;font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em}
.c3{grid-template-columns:1fr 68px 68px}
.c4{grid-template-columns:1fr 55px 55px 55px}
.cat{padding:6px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#0d4db5;background:#e8f0fe;border-bottom:1px solid #c7d8fc}
.row{display:grid;gap:3px;padding:7px 10px;border-bottom:1px solid #e5e7eb;align-items:center;background:white}
.pname{font-size:12px;font-weight:600;color:#1a1a1a;line-height:1.3}
.pbrand{font-size:9px;color:#9ca3af}
.punit{font-size:10px;color:#6b7280}
.inp{width:100%;padding:5px 3px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;text-align:center;background:#fafafa;color:#1a1a1a;outline:none;font-weight:600}
.inp:focus{border-color:#1a6ef5;background:white}
.inp.gs{background:#dcfce7;border-color:#86efac;color:#15803d}
.inp.gu{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.inp:disabled{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb;cursor:not-allowed}
.bw{background:#e5e7eb;border-radius:3px;height:3px;margin-top:2px;max-width:80px}
.bf{height:3px;border-radius:3px}
/* PANELS */
.panel{display:none}.panel.on{display:block}
.scr{overflow-y:auto}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px}
.stat{background:white;border-radius:9px;padding:8px;text-align:center;border:0.5px solid #e5e7eb}
.sn{font-size:20px;font-weight:800;line-height:1}
.sl{font-size:9px;color:#6b7280;margin-top:2px;font-weight:600;text-transform:uppercase}
/* FILTERS */
.frow{display:flex;gap:4px;padding:6px 10px;overflow-x:auto;background:white;border-bottom:1px solid #e5e7eb;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.fc{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1.5px solid #e5e7eb;background:white;cursor:pointer;white-space:nowrap;color:#6b7280}
.fc.on{background:#0d4db5;border-color:#0d4db5;color:white}
/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.br{background:#fee2e2;color:#dc2626}.ba{background:#fef3c7;color:#d97706}.bg{background:#dcfce7;color:#16a34a}
.bp{background:#dbeafe;color:#1e40af}.bs{background:#d1fae5;color:#065f46}.bc{background:#ffe4e6;color:#9f1239}
.bm{background:#fef9c3;color:#713f12}.bca{background:#ede9fe;color:#6d28d9}.bmt{background:#fce7f3;color:#9d174d}
/* ITEMS */
.item{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid #e5e7eb;background:white;gap:7px}
.item.done{background:#f0fdf4}
.iname{font-size:12px;font-weight:600;color:#1a1a1a}
.idet{font-size:10px;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.chk{width:30px;height:30px;border-radius:50%;border:2px solid #e5e7eb;background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chk.on{background:#16a34a;border-color:#16a34a;color:white}
/* LISTA COMPRAS */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px}
.pcard{background:white;border-radius:9px;padding:9px;border:0.5px solid #e5e7eb}
.pcl{font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px}
.pci{width:100%;border:none;outline:none;font-size:20px;font-weight:800;color:#0d4db5;padding:0;background:transparent}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:0 8px 8px}
.mc{background:#fafafa;border-radius:7px;padding:7px;border:0.5px solid #e5e7eb}
.mcl{font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:2px}
.mci{width:100%;border:none;outline:none;font-size:15px;font-weight:700;color:#1a1a1a;padding:0;background:transparent}
.thdr{padding:7px 12px;background:#f8f9fa;border-bottom:1px solid #e5e7eb;border-top:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between}
.tname{font-size:12px;font-weight:700}
.tcnt{font-size:10px;color:#6b7280;background:#e5e7eb;padding:2px 6px;border-radius:20px}
.li-row{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid #e5e7eb;background:white;gap:5px}
.li-row.done{background:#f0fdf4}
.li-name{font-size:12px;font-weight:600;color:#1a1a1a;flex:1}
.li-det{font-size:10px;color:#6b7280;margin-top:1px}
.li-stock{font-size:10px;font-weight:600}
.qi{width:52px;padding:4px 3px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:12px;text-align:center;font-weight:700;outline:none}
.qi:focus{border-color:#0d4db5}
.qi.hq{background:#fef3c7;border-color:#fcd34d}
.sel{padding:4px 3px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:10px;outline:none;background:white;color:#1a1a1a}
.sel:focus{border-color:#0d4db5}
.pri-row{display:flex;align-items:center;padding:4px 0;border-bottom:0.5px solid #f3f4f6;gap:4px}
.pri-inp{width:68px;padding:4px 5px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;text-align:right;outline:none}
.pri-inp:focus{border-color:#0d4db5}
.pri-inp.hp{background:#e8f0fe;border-color:#1a6ef5;font-weight:600}
/* PRESUPUESTO */
.bcard{background:white;border-radius:10px;padding:12px;margin-bottom:8px;border:0.5px solid #e5e7eb}
.btit{font-size:13px;font-weight:700;color:#0d4db5;margin-bottom:3px}
.bsub{font-size:11px;color:#6b7280;margin-bottom:8px}
.bbar{background:#e5e7eb;border-radius:5px;height:10px;margin:5px 0}
.bbarf{height:10px;border-radius:5px}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.bst{background:#f8f9fa;border-radius:8px;padding:8px;text-align:center}
.bstn{font-size:16px;font-weight:700}
.bstl{font-size:9px;color:#6b7280;text-transform:uppercase;margin-top:2px}
.binp{width:100%;padding:7px 10px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;outline:none;margin-bottom:6px;color:#1a1a1a}
.binp:focus{border-color:#0d4db5}
.bbtn{width:100%;padding:10px;background:#0d4db5;color:white;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
.gbtn{width:100%;padding:10px;background:#16a34a;color:white;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
.dlbtn{width:calc(100% - 16px);display:block;margin:8px;padding:10px;background:#7c3aed;color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.mtabs{display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none}
.mtabs::-webkit-scrollbar{display:none}
.mtab{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1.5px solid #e5e7eb;background:white;cursor:pointer;white-space:nowrap;color:#6b7280}
.mtab.on{background:#0d4db5;border-color:#0d4db5;color:white}
.prow{display:flex;align-items:center;padding:5px 0;border-bottom:0.5px solid #f3f4f6;gap:5px}
.prn{font-size:11px;font-weight:500;flex:1}
/* RESUMEN */
.rh{display:grid;grid-template-columns:90px repeat(7,1fr);gap:2px;padding:4px 8px;background:#f8f9fa;border-bottom:1px solid #e5e7eb;font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase}
.rr{display:grid;grid-template-columns:90px repeat(7,1fr);gap:2px;padding:5px 8px;border-bottom:1px solid #e5e7eb;align-items:center;background:white}
.rp{font-size:10px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc{text-align:center;font-size:10px;font-weight:600;color:#9ca3af}
.rc.hv{color:#0d4db5;background:#e8f0fe;border-radius:4px;padding:1px 0}
/* HISTORIAL */
.hcard{background:white;border-radius:9px;margin:7px 8px;padding:11px;border:0.5px solid #e5e7eb}
.htit{font-size:12px;font-weight:700;color:#0d4db5;margin-bottom:2px}
.hsu{font-size:10px;color:#6b7280;margin-bottom:7px}
.hi{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid #f3f4f6;font-size:10px}
.empty{padding:28px 16px;text-align:center;color:#6b7280}
.ei{font-size:32px;margin-bottom:7px}
.et{font-size:13px;font-weight:500}
.es{font-size:11px;opacity:0.7;margin-top:3px}
.bud-box{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:10px;margin-bottom:8px}
.bud-lbl{font-size:10px;font-weight:700;color:#92400e;text-transform:uppercase;margin-bottom:3px}
.bud-num{font-size:22px;font-weight:800;color:#92400e}
.bud-sub{font-size:10px;color:#b45309;margin-top:2px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="llogo">🍽</div>
  <div class="ltitle">Cocina Mission of Hope</div>
  <div class="lsub">Ingresa tu código de acceso</div>
  <div class="lcard">
    <label class="llbl">Código</label>
    <input class="linp" type="password" id="pinInp" maxlength="4" inputmode="numeric" placeholder="••••">
    <button class="lbtn" id="loginBtn">Entrar</button>
    <div class="lerr" id="loginErr">Código incorrecto</div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="hdr" id="appHdr">
    <div class="hdr-top">
      <div><div class="htitle" id="hdrTitle"></div><div class="hsub">Mission of Hope</div></div>
      <div style="display:flex;align-items:center;gap:5px">
        <div class="wknav" id="wkNav" style="display:none">
          <button class="wkb" id="wkPrev">‹</button>
          <div class="wkl" id="wkLbl"></div>
          <button class="wkb" id="wkNext">›</button>
        </div>
        <button class="outb" id="outBtn">Salir</button>
      </div>
    </div>
    <span class="rlbl" id="roleLbl"></span>
  </div>
  <div style="display:flex;align-items:center;background:#0a3d8f">
  <div class="sync" id="syncBar" style="flex:1;margin:0">Conectando...</div>
  <button onclick="fetchAll()" style="background:rgba(255,255,255,0.15);border:none;color:white;padding:3px 10px;font-size:11px;cursor:pointer;white-space:nowrap;height:100%">🔄 Actualizar</button>
</div>

  <!-- COCINERA VIEW -->
  <div id="cocView" style="display:none">
    <div class="days" id="dayTabs"></div>
    <div class="mrow" id="mealTabs"></div>
    <div class="srch"><input type="search" id="srchCoc" placeholder="🔍 Buscar por número o nombre..."></div>
    <div class="colh c3"><div>Producto</div><div style="text-align:center">Stock</div><div style="text-align:center">Usamos</div></div>
    <div class="scr" id="cocList" style="height:calc(100vh - 320px)"></div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="admView" style="display:none">
    <div class="tabs" id="admTabs"></div>
    <div class="panel on" id="pStock">
      <div class="stats">
        <div class="stat"><div class="sn" style="color:#dc2626" id="stC">—</div><div class="sl">Crítico</div></div>
        <div class="stat"><div class="sn" style="color:#d97706" id="stB">—</div><div class="sl">Bajo</div></div>
        <div class="stat"><div class="sn" style="color:#16a34a" id="stO">—</div><div class="sl">OK</div></div>
      </div>
      <div class="frow" id="stockFil"></div>
      <div class="srch"><input type="search" id="srchSt" placeholder="🔍 Buscar..."></div>
      <div class="scr" id="stockList" style="height:calc(100vh - 290px)"></div>
    </div>
    <div class="panel" id="pLista">
      <div class="scr" id="listaWrap" style="height:calc(100vh - 135px)"></div>
    </div>
    <div class="panel" id="pResumen">
      <div class="srch"><input type="search" id="srchRes" placeholder="🔍 Buscar..."></div>
      <div class="rh"><div>Producto</div><div>Lu</div><div>Ma</div><div>Mi</div><div>Ju</div><div>Vi</div><div>Sa</div><div>Do</div></div>
      <div class="scr" id="resList" style="height:calc(100vh - 215px)"></div>
    </div>
    <div class="panel" id="pCorregir">
      <div class="days" id="dayTabsA"></div>
      <div class="mrow" id="mealTabsA"></div>
      <div class="srch"><input type="search" id="srchCo" placeholder="🔍 Buscar..."></div>
      <div class="colh c3"><div>Producto</div><div style="text-align:center">Stock</div><div style="text-align:center">Usamos</div></div>
      <div class="scr" id="corrList" style="height:calc(100vh - 350px)"></div>
    </div>
    <div class="panel" id="pPresupuesto">
      <div class="scr" id="presWrap" style="height:calc(100vh - 135px);padding:8px"></div>
    </div>
    <div class="panel" id="pHistorial">
      <div id="histWrap" style="max-height:calc(100vh - 135px);overflow-y:auto"></div>
    </div>
  </div>
</div>

<script>
// ── FIREBASE REST API ─────────────────────────────────────
const DB_URL='https://moh--cocina-default-rtdb.firebaseio.com';
const DB={
  async get(p){try{const r=await fetch(DB_URL+p+'.json?t='+Date.now());return await r.json();}catch(e){return null;}},
  async set(p,v){try{await fetch(DB_URL+p+'.json',{method:'PUT',body:JSON.stringify(v),headers:{'Content-Type':'application/json'}});}catch(e){}},
  async push(p,v){try{await fetch(DB_URL+p+'.json',{method:'POST',body:JSON.stringify(v),headers:{'Content-Type':'application/json'}});}catch(e){}}
};

// ── ROLES ─────────────────────────────────────────────────
const ROLES={1111:'cocinera',2222:'ramona',6421:'jeidi'};
const RNAMES={cocinera:'👩‍🍳 Cocinera',ramona:'👩‍💼 Ramona — Supervisora',jeidi:'🛒 Jeidi — Encargada'};

const MEALS=['☀️ Desayuno','🍽 Almuerzo','📦 Neverita','🌙 Cena'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const TIENDAS=['P','S','C','M','A','CA','MT'];
const TLBL={P:'🔵 PriceSmart',S:'🟢 Supermercado',C:'🔴 Carnicería',M:'🟡 Mercadito',A:'💧 Almoloya',CA:'☕ Café Monte Alto',MT:'🏔 Monte Alto'};
const TCLS={P:'bp',S:'bs',C:'bc',M:'bm',A:'bca',CA:'bmt',MT:'bca'};
const UNIDADES=['Unidad','Caja','Libras','Paquete','Galón','30 und','25 und','8 und','Rama','Cartones','Lata'];

// ── PRODUCTS ──────────────────────────────────────────────
// Default tienda per product
const DTIENDA={};
// Cocina products (253)
const CATS_COCINA=[
  {cat:'🧹 Limpieza y Desinfección (Cocina)',items:[
    {id:'c001',n:'1. Cloro',u:'Caja',t:'P'},{id:'c002',n:'2. Toallitas desinfectantes',u:'Unidad',t:'P'},
    {id:'c003',n:'3. Fabuloso',u:'Unidad',t:'P'},{id:'c004',n:'4. Baygon',u:'Unidad',t:'S'},
    {id:'c005',n:'5. Fundas basura pequeñas (4 gal)',u:'Paquete',t:'P'},{id:'c006',n:'6. Fundas basura grandes blancas (13 gal)',u:'Paquete',t:'P'},
    {id:'c007',n:'7. Fundas basura grandes negras (55 gal)',u:'Paquete',t:'P'},{id:'c008',n:'8. Lava platos grande',u:'Unidad',t:'S'},
    {id:'c009',n:'9. Lava platos pequeño',u:'Unidad',t:'S'},{id:'c010',n:'10. Jabón en pasta AXION',u:'Unidad',t:'S'},
    {id:'c011',n:'11. Esponjas de fregar',u:'Unidad',t:'S'},{id:'c012',n:'12. Brillo Scotch-Brite',u:'Unidad',t:'S'},

let weekData={}, listaData={}, semInfo={}, presData={}, precios={};
let checked={}, stockFil='todos', presMonth=new Date().getMonth();
let pollTimer=null, listaTiendaOverride={}, listaUnidadOverride={};

function getMonday(d){const dt=new Date(d);const dw=dt.getDay();dt.setDate(dt.getDate()-dw+(dw===0?-6:1));dt.setHours(0,0,0,0);return dt;}
function wk(){return weekStart.toISOString().slice(0,10).replace(/-/g,'_');}
function sk(id){return 's_'+id;}
function dk(d,m,id){return 'd'+d+'_m'+m+'_'+id;}
function totalUsed(id){let t=0;for(let d=0;d<7;d++)for(let m=0;m<4;m++){const v=weekData[dk(d,m,id)];if(v!=null)t+=Number(v);}return t;}
function dayUsed(id,d){let t=0;for(let m=0;m<4;m++){const v=weekData[dk(d,m,id)];if(v!=null)t+=Number(v);}return t;}
function setSyncBar(msg,cls){const b=document.getElementById('syncBar');b.className='sync '+(role==='cocinera'?'sb':'sd')+' '+cls;b.textContent=msg;}
function fmtRD(n){return 'RD$ '+Number(Math.abs(n)).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtUSD(n){return '$ '+Number(Math.abs(n)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

      html+=`<div class="row c3">

  await save('/semanas/'+wk()+'/'+k,v===''?null:parseFloat(v));
}

// ── STOCK STATUS ──────────────────────────────────────────
function getStatus(id){
  const stock=Number(weekData[sk(id)]||0);const used=totalUsed(id);
  if(stock===0&&used===0)return null;
  const rem=stock-used;const pct=stock>0?Math.min(100,Math.max(0,Math.round(rem/stock*100))):0;
  if(rem<0||pct<=10)return{type:'critico',rem,stock,used,pct};
  if(pct<=30)return{type:'bajo',rem,stock,used,pct};
  return{type:'ok',rem,stock,used,pct};
}

function renderStockList(){
  const q=(document.getElementById('srchSt').value||'').toLowerCase();
  let html='',nC=0,nB=0,nO=0;
  for(const cat of ALL_CATS){
    let ch='';
    for(const p of cat.items){
      const st=getStatus(p.id);if(!st)continue;
      if(st.type==='critico')nC++;else if(st.type==='bajo')nB++;else nO++;
      const t=DTIENDA[p.id]||'S';
      if(stockFil==='critico'&&st.type!=='critico')continue;
      if(stockFil==='bajo'&&st.type!=='bajo')continue;
      if(stockFil==='ok'&&st.type!=='ok')continue;
      if(['P','S','C','M'].includes(stockFil)&&t!==stockFil)continue;
      if(q&&!p.n.toLowerCase().includes(q))continue;
      const isDone=role==='jeidi'&&!!checked[p.id];
      let badge='';
      if(st.type==='critico')badge=`<span class="badge br">${st.rem<0?'Agotado':'Crítico: '+st.rem+' '+p.u.split('-')[0]}</span>`;
      else if(st.type==='bajo')badge=`<span class="badge ba">Bajo: ${st.rem} ${p.u.split('-')[0]}</span>`;
      else badge=`<span class="badge bg">OK: ${st.rem} ${p.u.split('-')[0]}</span>`;
      const bc=st.pct>50?'#16a34a':st.pct>20?'#d97706':'#dc2626';
      ch+=`<div class="item${isDone?' done':''}">
        <div style="flex:1">
          <div class="iname"${isDone?' style="text-decoration:line-through;opacity:0.5"':''}>${p.n}</div>
          <div class="idet"><span class="badge ${TCLS[t]||'bs'}">${TLBL[t]}</span>${badge}</div>
          <div class="bw" style="max-width:120px"><div class="bf" style="width:${st.pct}%;background:${bc}"></div></div>
        </div>
        ${role==='jeidi'?`<button class="chk${isDone?' on':''}" onclick="toggleChk('${p.id}')">${isDone?'✓':'○'}</button>`:''}
      </div>`;
    }
    if(ch)html+=`<div class="cat">${cat.cat}</div>${ch}`;
  }
  document.getElementById('stC').textContent=nC;
  document.getElementById('stB').textContent=nB;
  document.getElementById('stO').textContent=nO;
  document.getElementById('stockList').innerHTML=html||'<div class="empty"><div class="ei">📋</div><div class="et">Sin datos</div><div class="es">Las cocineras aún no registraron uso</div></div>';
}
function toggleChk(id){checked[id]=!checked[id];renderStockList();}

function calcListaTotal(){
  const tasa=Number(presData.tasa||60);
  let totalRD=0;
  ALL_CATS.forEach(cat=>cat.items.forEach(p=>{
    const item=listaData[p.id]||{};
    const qty=Number(item.q||0);
    const pr=Number(item.pr||0);
    if(qty>0&&pr>0)totalRD+=qty*pr;
  }));
  return {totalRD,totalUSD:totalRD/tasa};
}

function renderResumen(){
  const q=(document.getElementById('srchRes').value||'').toLowerCase();
  let html='';
  for(const cat of ALL_CATS){
    const items=cat.items.filter(p=>p.n.toLowerCase().includes(q));
    if(!items.length)continue;
    let ch='';
    for(const p of items){
      let cells='',has=false;
      for(let d=0;d<7;d++){const v=dayUsed(p.id,d);if(v>0)has=true;cells+=`<div class="rc${v>0?' hv':''}">${v>0?v:'—'}</div>`;}
      if(!has)continue;
      ch+=`<div class="rr"><div class="rp" title="${p.n}">${p.n}</div>${cells}</div>`;
    }
    if(ch)html+=`<div class="cat">${cat.cat}</div>${ch}`;
  }
  document.getElementById('resList').innerHTML=html||'<div class="empty"><div class="ei">📅</div><div class="et">Sin movimientos</div></div>';
}

async function renderPresupuesto(){
  const el=document.getElementById('presWrap');
  const tasa=Number(presData.tasa||60);
  const staffUSD=Number(presData.staff_weekly||900);
  const grpUSD=Number(presData['g_'+new Date().getFullYear()+'_'+presMonth]||0);

  const {totalRD:listaRD}=calcListaTotal();

  // Also count prices*used from weekData

  </div>
  <div class="bcard">
    <div class="btit">💰 ${MESES[presMonth]} — Resumen general</div>
    <div class="bsub">Tasa: 1 USD = ${tasa} RD$ · Staff ${fmtUSD(staffUSD)}/sem × 4 + Grupos</div>
    <div style="text-align:center;margin:8px 0">

    <div style="display:flex;justify-content:space-between;font-size:10px;color:#9ca3af;margin-top:2px"><span>RD$0</span><span>${fmtRD(budgetRD)}</span></div>
    <div class="bgrid">
      <div class="bst"><div class="bstn" style="color:#0d4db5">${fmtRD(budgetRD)}</div><div style="font-size:10px;color:#9ca3af">${fmtUSD(budgetUSD)}</div><div class="bstl">Presupuesto</div></div>
      <div class="bst"><div class="bstn" style="color:${bc}">${fmtRD(totalGastoRD)}</div><div style="font-size:10px;color:#9ca3af">${fmtUSD(totalGastoRD/tasa)}</div><div class="bstl">Gastado</div></div>
      <div class="bst"><div class="bstn" style="color:${remRD>=0?'#16a34a':'#dc2626'}">${fmtRD(Math.abs(remRD))}</div><div style="font-size:10px;color:#9ca3af">${fmtUSD(Math.abs(remRD/tasa))}</div><div class="bstl">${remRD>=0?'Sobrante':'Faltante'}</div></div>
      <div class="bst"><div class="bstn" style="color:#6b7280">${pct}%</div><div style="font-size:10px;color:#9ca3af">&nbsp;</div><div class="bstl">Ejecutado</div></div>
    </div>
  </div>`;

  if(isJ){
    html+=`<div class="bcard">
      <div class="btit">✏️ Editar presupuesto</div>
      <div class="bsub">En dólares — se convierte a pesos con la tasa</div>
      <label style="font-size:10px;font-weight:700;color:#6b7280;display:block;margin-bottom:4px">💱 Tasa (1 USD = ? RD$)</label>
      <input class="binp" type="number" id="ptasa" value="${tasa}" placeholder="60" step="0.5">

      <input class="binp" type="number" id="pram" value="${ramBudgetRD||''}" placeholder="Ej: 50000">
      <button class="bbtn" onclick="savePresupuesto()">💾 Guardar presupuesto</button>
    </div>`;
  }

  // Top costosos from lista
  const costs=[];
  ALL_CATS.forEach(cat=>cat.items.forEach(p=>{
    const item=listaData[p.id]||{};
    const qty=Number(item.q||0);const pr=Number(item.pr||precios[p.id]||0);
    if(qty>0&&pr>0)costs.push({n:p.n,u:item.u||p.u,qty,pr,cost:qty*pr});

          <span style="font-size:10px;color:#6b7280;white-space:nowrap">RD$&nbsp;</span>
          <input class="pri-inp${pv?' hp':''}" type="number" min="0" step="1" placeholder="0" value="${pv}" data-id="${p.id}" onchange="onPrEdit(this)" style="width:72px;padding:4px 5px;border:1.5px solid;border-color:${pv?'#1a6ef5':'#e5e7eb'};border-radius:6px;font-size:12px;text-align:right;outline:none;background:${pv?'#e8f0fe':'white'}">
        </div>`;

    }

    html+=`<button class="gbtn" onclick="guardarSemana()">💾 Guardar semana en historial</button>`;

function filPr(){
  const q=(document.getElementById('srchPr')?.value||'').toLowerCase();
  document.querySelectorAll('#prList .prow').forEach(r=>{r.style.display=(r.dataset.n||'').includes(q)?'':'none';});
  document.querySelectorAll('#prList .cat').forEach(cat=>{
    let vis=false,el=cat.nextElementSibling;
    while(el&&!el.classList.contains('cat')){if(el.style.display!=='none')vis=true;el=el.nextElementSibling;}
    cat.style.display=vis?'':'none';
  });
}

// ── HISTORIAL ─────────────────────────────────────────────
async function guardarSemana(){
  const end=new Date(weekStart);end.setDate(end.getDate()+6);
  const fmt=dt=>dt.toLocaleDateString('es-DO',{day:'numeric',month:'short',year:'numeric'});
  const semLabel=semInfo.semName||fmt(weekStart)+' — '+fmt(end);
  const {totalRD}=calcListaTotal();
  const tasa=Number(presData.tasa||60);
  const semLabel2=semInfo.semName||fmt(weekStart)+' — '+fmt(end);
  const snap={
    semana:semLabel2,
    fecha:new Date().toLocaleDateString('es-DO',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    totalGastoRD:totalRD,totalGastoUSD:totalRD/tasa,tasa,
    resumen:{}
  };
  ALL_CATS.forEach(cat=>cat.items.forEach(p=>{
    const stock=Number(weekData[sk(p.id)]||0);const used=totalUsed(p.id);
    const item=listaData[p.id]||{};
    const qty=Number(item.q||0);const pr=Number(item.pr||precios[p.id]||0);
    if(stock>0||used>0||qty>0)
      snap.resumen[p.id]={n:p.n,u:p.u,stock,usado:used,quedo:Math.max(0,stock-used),comprado:qty,precio:pr,costo:qty*pr};
  }));
  await DB.push('/historial',snap);
  alert('✅ Semana guardada en el historial correctamente.');
}

async function renderHistorial(){
  const el=document.getElementById('histWrap');
  el.innerHTML='<div class="empty"><div class="ei">⏳</div><div class="et">Cargando...</div></div>';
  try{
    const hist=await DB.get('/historial');
    // Always show action buttons
    let topBtns='<button class="dlbtn" onclick="downloadReporteSemana()" style="background:#0d4db5">📄 Descargar reporte semana actual</button>';
    if(hist){
      topBtns+='<button class="dlbtn" onclick="downloadHistorial()">⬇️ Descargar historial completo (CSV)</button>';
      topBtns+='<button onclick="clearWeekData()" style="display:block;width:calc(100% - 16px);margin:0 8px 8px;padding:10px;background:#dc2626;color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">🗑 Borrar datos de semana actual</button>';
    }
    if(!hist){el.innerHTML=topBtns+'<div class="empty"><div class="ei">🗂</div><div class="et">Sin historial guardado aún</div><div class="es">Usa "Descargar reporte" para exportar esta semana</div></div>';return;}
    const entries=Object.entries(hist).reverse();
    let html=`<button class="dlbtn" onclick="downloadHistorial()">⬇️ Descargar historial completo</button>
    <button onclick="clearWeekData()" style="display:block;width:calc(100% - 16px);margin:0 8px 8px;padding:10px;background:#dc2626;color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">🗑 Borrar datos de semana actual</button>`;
    for(const [key,e] of entries){
      let items='',nU=0,nA=0;
      for(const v of Object.values(e.resumen||{})){
        if(v.usado>0||v.comprado>0){
          items+=`<div class="hi">
            <span>${v.n}</span>
            <span style="color:#6b7280;font-size:10px">
              ${v.stock>0?'Stock: '+v.stock+' · ':''}
              ${v.usado>0?'Usado: '+v.usado+' · ':''}
              ${v.quedo>0?'Quedó: '+v.quedo:v.usado>0?'<span style=color:#dc2626>Agotado</span>':''}
              ${v.comprado>0?'· Comprado: '+v.comprado+' '+v.u:''}
              ${v.costo>0?'· '+fmtRD(v.costo):''}
            </span>
          </div>`;
          nU++;if(v.quedo<=0&&v.usado>0)nA++;
        }
      }
      const gastoTxt=e.totalGastoRD>0?` · Gasto: ${fmtRD(e.totalGastoRD)} (${fmtUSD(e.totalGastoUSD||0)})`:'';
      html+=`<div class="hcard">
        <div class="htit">📅 ${e.semana}</div>
        <div class="hsu">Guardado: ${e.fecha}${gastoTxt}${nA>0?' · ⚠ '+nA+' agotados':''}</div>
        ${items||'<div style="font-size:11px;color:#9ca3af">Sin movimientos</div>'}
      </div>`;
    }
    el.innerHTML=html;
  }catch(e){el.innerHTML='<div class="empty"><div class="ei">⚠️</div><div class="et">Error al cargar</div></div>';}
}

}
function downloadReporteSemana(){
  const end=new Date(weekStart);end.setDate(end.getDate()+6);
  const fmt=dt=>dt.toLocaleDateString('es-DO',{day:'numeric',month:'short',year:'numeric'});
  const fmtNum=n=>Number(n||0).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});
  const tasa=Number(presData.tasa||60);
  const staffUSD=Number(presData.staff_weekly||900);
  const grpUSD=Number(presData['g_'+new Date().getFullYear()+'_'+presMonth]||0);
  const budgetUSD=staffUSD*4+grpUSD;
  const budgetRD=budgetUSD*tasa;
  const {totalRD}=calcListaTotal();
  const remRD=budgetRD-totalRD;

  const semName=semInfo.semName||'';
  const semA=Number(semInfo.semA||0),semB=Number(semInfo.semB||0),staff=Number(semInfo.staff||50);
  const ramBudget=Number(semInfo.ramBudget||0);

  let html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
  <title>Reporte Semana ${semLabel}</title>
  <style>
    body{font-family:Arial,sans-serif;margin:20px;color:#1a1a1a;font-size:13px}
    h1{color:#0d4db5;font-size:20px;margin-bottom:4px}
    h2{color:#0d4db5;font-size:15px;margin:20px 0 8px;border-bottom:2px solid #e8f0fe;padding-bottom:4px}
    h3{color:#374151;font-size:13px;margin:12px 0 6px}
    .header{background:#0d4db5;color:white;padding:16px 20px;border-radius:8px;margin-bottom:20px}
    .header h1{color:white;margin:0 0 4px}
    .header p{margin:2px 0;opacity:0.85;font-size:12px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .stat{background:#f8f9fa;border:1px solid #e5e7eb;border-radius:8px;padding:12px;text-align:center}
    .stat-n{font-size:20px;font-weight:800;color:#0d4db5}
    .stat-l{font-size:10px;color:#6b7280;text-transform:uppercase;margin-top:3px}
    .budget{background:${remRD>=0?'#f0fdf4':'#fee2e2'};border:1px solid ${remRD>=0?'#86efac':'#fca5a5'};border-radius:8px;padding:14px;margin-bottom:16px}
    table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:12px}
    th{background:#0d4db5;color:white;padding:7px 10px;text-align:left;font-size:11px}
    td{padding:6px 10px;border-bottom:1px solid #f3f4f6}
    tr:nth-child(even){background:#f8f9fa}
    .meals-table th{background:#374151}
    .cat-row{background:#e8f0fe!important;font-weight:700;color:#0d4db5}
    .agotado{color:#dc2626;font-weight:700}
    .ok{color:#16a34a;font-weight:700}
    .comprado{text-decoration:line-through;opacity:0.5}
    @media print{body{margin:0}.no-print{display:none}}
  </style></head><body>
  <div class="header">
    <h1>🍽 Reporte Semanal — Mission of Hope</h1>
    <p>Semana: <strong>${semLabel}</strong></p>
    <p>Generado: ${new Date().toLocaleDateString('es-DO',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</p>
    <p>Tasa de cambio: 1 USD = ${tasa} RD$</p>
  </div>

  <h2>👥 Personas y comidas</h2>
  <div class="stats">
    <div class="stat"><div class="stat-n">${semA}</div><div class="stat-l">${semInfo.lblA||'Semana A'}</div></div>
    <div class="stat"><div class="stat-n">${semB}</div><div class="stat-l">${semInfo.lblB||'Semana B'}</div></div>
    <div class="stat"><div class="stat-n">${staff}</div><div class="stat-l">Staff + Internos</div></div>
    <div class="stat"><div class="stat-n">${semA+semB+staff}</div><div class="stat-l">Total personas</div></div>
  </div>
  <table class="meals-table">
    <tr><th>Comida</th>${DAYS.map(d=>`<th>${d.slice(0,3)}</th>`).join('')}<th>Total semana</th></tr>
    ${MEALS.map((m,mi)=>{
      let rowTotal=0;
      const cells=DAYS.map((d,di)=>{const v=Number(semInfo['meal_'+mi+'_'+di]||0);rowTotal+=v;return `<td style="text-align:center">${v||'—'}</td>`;}).join('');
      return `<tr><td><strong>${m}</strong></td>${cells}<td style="text-align:center;font-weight:700">${rowTotal||'—'}</td></tr>`;
    }).join('')}
  </table>

  <h2>💰 Presupuesto</h2>
  <div class="budget">
    <table style="margin:0">
      <tr><td><strong>Presupuesto total</strong></td><td><strong>RD$ ${fmtNum(budgetRD)}</strong></td><td style="color:#6b7280">$ ${fmtNum(budgetUSD)}</td></tr>
      <tr><td>Staff (${fmtNum(staffUSD*tasa)} RD$/sem × 4)</td><td>RD$ ${fmtNum(staffUSD*4*tasa)}</td><td style="color:#6b7280">$ ${fmtNum(staffUSD*4)}</td></tr>
      <tr><td>Grupos del mes</td><td>RD$ ${fmtNum(grpUSD*tasa)}</td><td style="color:#6b7280">$ ${fmtNum(grpUSD)}</td></tr>
      <tr><td>Presupuesto Ramona esta semana</td><td>RD$ ${fmtNum(ramBudget)}</td><td></td></tr>
      <tr style="background:${remRD>=0?'#f0fdf4':'#fee2e2'}"><td><strong>${remRD>=0?'✅ Sobrante':'❌ Faltante'}</strong></td><td><strong style="color:${remRD>=0?'#16a34a':'#dc2626'}">RD$ ${fmtNum(Math.abs(remRD))}</strong></td><td style="color:#6b7280">$ ${fmtNum(Math.abs(remRD/tasa))}</td></tr>
      <tr><td><strong>Total compras (lista)</strong></td><td><strong>RD$ ${fmtNum(totalRD)}</strong></td><td style="color:#6b7280">$ ${fmtNum(totalRD/tasa)}</td></tr>
    </table>
  </div>

  <h2>🛒 Lista de compras</h2>`;

  // Products bought (in lista)
  const tiendaProds={};
  TIENDAS.forEach(t=>{tiendaProds[t]=[];});
  ALL_CATS.forEach(cat=>cat.items.forEach(p=>{
    const item=listaData[p.id]||{};
    const qty=Number(item.q||0);
    if(qty>0){
      const t=item.ti||DTIENDA[p.id]||'S';
      const pr=Number(item.pr||precios[p.id]||0);
      tiendaProds[t].push({n:p.n,u:item.u||p.u,qty,pr,cost:qty*pr,done:item.c||false});
    }
  }));

  TIENDAS.forEach(t=>{
    if(!tiendaProds[t].length)return;
    const subtotal=tiendaProds[t].reduce((s,p)=>s+p.cost,0);
    html+=`<h3>${TLBL[t]}${subtotal>0?' — RD$ '+fmtNum(subtotal):''}</h3>
    <table><tr><th>Producto</th><th>Cantidad</th><th>Unidad</th><th>Precio RD$</th><th>Subtotal RD$</th><th>Estado</th></tr>`;
    tiendaProds[t].forEach(p=>{
      html+=`<tr class="${p.done?'comprado':''}"><td>${p.n}</td><td>${p.qty}</td><td>${p.u}</td><td>${p.pr?'RD$ '+fmtNum(p.pr):'—'}</td><td>${p.cost?'RD$ '+fmtNum(p.cost):'—'}</td><td>${p.done?'✅ Comprado':'⏳ Pendiente'}</td></tr>`;
    });
    html+='</table>';
  });

  html+=`<h2>📦 Inventario — Stock y uso semanal</h2>
  <table><tr><th>Producto</th><th>Unidad</th><th>Stock inicial</th><th>Total usado</th><th>Quedó</th><th>Estado</th></tr>`;

  ALL_CATS.forEach(cat=>{
    const withData=cat.items.filter(p=>Number(weekData[sk(p.id)]||0)>0||totalUsed(p.id)>0);
    if(!withData.length)return;
    html+=`<tr class="cat-row"><td colspan="6">${cat.cat}</td></tr>`;
    withData.forEach(p=>{
      const stock=Number(weekData[sk(p.id)]||0);
      const used=totalUsed(p.id);
      const quedo=Math.max(0,stock-used);
      const estado=stock>0&&used>=stock?'<span class="agotado">Agotado</span>':quedo>0?`<span class="ok">${quedo} disponibles</span>`:'Sin stock';
      html+=`<tr><td>${p.n}</td><td>${p.u}</td><td>${stock||'—'}</td><td>${used||'—'}</td><td>${quedo||'—'}</td><td>${estado}</td></tr>`;
    });
  });

  html+=`</table>
  <p style="text-align:center;color:#9ca3af;font-size:11px;margin-top:20px">Generado por Sistema de Inventario — Mission of Hope Cocina</p>
  <button onclick="window.print()" class="no-print" style="display:block;margin:10px auto;padding:10px 24px;background:#0d4db5;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer">🖨 Imprimir / Guardar PDF</button>
  </body></html>`;

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='Reporte_Semana_MOH_'+wk()+'.html';a.click();
  URL.revokeObjectURL(url);
}
function downloadHistorial(){
  DB.get('/historial').then(hist=>{
    if(!hist){alert('Sin historial para descargar');return;}
    const tasa=Number(presData.tasa||60);
    let csv='Semana,Fecha guardado,Producto,Unidad,Stock inicial,Usado,Quedó,Comprado,Precio RD$,Costo RD$,Costo USD\n';
    Object.values(hist).reverse().forEach(e=>{
      Object.values(e.resumen||{}).forEach(v=>{
        if(v.usado>0||v.comprado>0){
          csv+=`"${e.semana}","${e.fecha}","${v.n}","${v.u}",${v.stock||0},${v.usado||0},${v.quedo||0},${v.comprado||0},${v.precio||0},${v.costo||0},${((v.costo||0)/tasa).toFixed(2)}\n`;
        }
      });
    });
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='historial_cocina_MOH.csv';a.click();
    URL.revokeObjectURL(url);
  });
}
