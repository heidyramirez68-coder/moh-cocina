<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh;font-size:14px}
/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#0d4db5,#1a6ef5)}
.lcard{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.2);text-align:center}
.llogo{font-size:48px;margin-bottom:8px}
.ltitle{color:white;font-size:22px;font-weight:700;margin-bottom:4px}
.lsub{color:rgba(255,255,255,0.8);font-size:13px;margin-bottom:24px}
.llbl{font-size:12px;font-weight:600;color:#6b7280;margin-bottom:6px;display:block;text-align:left}
.linp{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:12px;font-size:22px;text-align:center;letter-spacing:8px;font-weight:700;outline:none}
.linp:focus{border-color:#1a6ef5}
.lbtn{width:100%;padding:13px;background:#1a6ef5;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.lerr{color:#dc2626;font-size:12px;text-align:center;margin-top:8px;display:none}
/* APP SHELL */
#appScreen{display:none}
.hdr{color:white;padding:10px 14px 7px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.hdr-b{background:#1a6ef5}.hdr-d{background:#0d4db5}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.htitle{font-size:14px;font-weight:700}
.hsub{font-size:10px;opacity:0.8}
.wknav{display:flex;align-items:center;gap:4px}
.wkb{background:rgba(255,255,255,0.2);border:none;color:white;width:26px;height:26px;border-radius:7px;font-size:16px;cursor:pointer;line-height:1}
.wkl{font-size:10px;font-weight:600;min-width:128px;text-align:center;background:rgba(255,255,255,0.15);padding:4px 6px;border-radius:7px}
.outb{background:rgba(255,255,255,0.2);border:none;color:white;padding:4px 9px;border-radius:7px;font-size:11px;cursor:pointer}
.rlbl{background:rgba(255,255,255,0.22);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.sync{padding:4px 14px;font-size:11px;text-align:center;min-height:22px}
.sb{background:#0d4db5}.sd{background:#0a3d8f}
.sok{color:#86efac}.serr{color:#fca5a5}.sing{color:#fde68a}
/* TABS */
.tabs{display:flex;background:white;border-bottom:1px solid #e5e7eb;overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:52px;padding:8px 3px;font-size:10px;font-weight:600;color:#6b7280;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;text-align:center}
.tab.on{color:#0d4db5;border-bottom-color:#0d4db5}
/* DAY/MEAL */
.days{display:flex;gap:4px;padding:7px 10px;overflow-x:auto;background:white;border-bottom:1px solid #e5e7eb;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.db{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1.5px solid #e5e7eb;background:white;cursor:pointer;white-space:nowrap;color:#6b7280}
.db.on{background:#1a6ef5;border-color:#1a6ef5;color:white}
.mrow{display:flex;gap:4px;padding:5px 10px;background:#fafafa;border-bottom:1px solid #e5e7eb}
.mb{flex:1;padding:5px 2px;border-radius:7px;font-size:9px;font-weight:600;border:1.5px solid #e5e7eb;background:white;cursor:pointer;color:#6b7280;text-align:center;line-height:1.4}
.mb.on{background:#e8f0fe;border-color:#1a6ef5;color:#1a6ef5}
/* SEARCH */
.srch{padding:6px 10px;background:white;border-bottom:1px solid #e5e7eb}
.srch input{width:100%;padding:7px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:13px;background:#fafafa;outline:none}
.srch input:focus{border-color:#1a6ef5;background:white}
/* PRODUCT ROWS */
.colh{display:grid;gap:3px;padding:4px 10px;background:#f8f9fa;border-bottom:1px solid #e5e7eb;font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em}
.c3{grid-template-columns:1fr 68px 68px}
.c4{grid-template-columns:1fr 55px 55px 55px}
.cat{padding:6px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#0d4db5;background:#e8f0fe;border-bottom:1px solid #c7d8fc}
.row{display:grid;gap:3px;padding:7px 10px;border-bottom:1px solid #e5e7eb;align-items:center;background:white}
.pname{font-size:12px;font-weight:600;color:#1a1a1a;line-height:1.3}
.pbrand{font-size:9px;color:#9ca3af}
.punit{font-size:10px;color:#6b7280}
.inp{width:100%;padding:5px 3px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;text-align:center;background:#fafafa;color:#1a1a1a;outline:none;font-weight:600}
.inp:focus{border-color:#1a6ef5;background:white}
.inp.gs{background:#dcfce7;border-color:#86efac;color:#15803d}
.inp.gu{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.inp:disabled{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb;cursor:not-allowed}
.bw{background:#e5e7eb;border-radius:3px;height:3px;margin-top:2px;max-width:80px}
.bf{height:3px;border-radius:3px}
/* PANELS */
.panel{display:none}.panel.on{display:block}
.scr{overflow-y:auto}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px}
.stat{background:white;border-radius:9px;padding:8px;text-align:center;border:0.5px solid #e5e7eb}
.sn{font-size:20px;font-weight:800;line-height:1}
.sl{font-size:9px;color:#6b7280;margin-top:2px;font-weight:600;text-transform:uppercase}
/* FILTERS */
.frow{display:flex;gap:4px;padding:6px 10px;overflow-x:auto;background:white;border-bottom:1px solid #e5e7eb;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.fc{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1.5px solid #e5e7eb;background:white;cursor:pointer;white-space:nowrap;color:#6b7280}
.fc.on{background:#0d4db5;border-color:#0d4db5;color:white}
/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.br{background:#fee2e2;color:#dc2626}.ba{background:#fef3c7;color:#d97706}.bg{background:#dcfce7;color:#16a34a}
.bp{background:#dbeafe;color:#1e40af}.bs{background:#d1fae5;color:#065f46}.bc{background:#ffe4e6;color:#9f1239}
.bm{background:#fef9c3;color:#713f12}.bca{background:#ede9fe;color:#6d28d9}.bmt{background:#fce7f3;color:#9d174d}
/* ITEMS */
.item{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid #e5e7eb;background:white;gap:7px}
.item.done{background:#f0fdf4}
.iname{font-size:12px;font-weight:600;color:#1a1a1a}
.idet{font-size:10px;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.chk{width:30px;height:30px;border-radius:50%;border:2px solid #e5e7eb;background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chk.on{background:#16a34a;border-color:#16a34a;color:white}
/* LISTA COMPRAS */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px}
.pcard{background:white;border-radius:9px;padding:9px;border:0.5px solid #e5e7eb}
.pcl{font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px}
.pci{width:100%;border:none;outline:none;font-size:20px;font-weight:800;color:#0d4db5;padding:0;background:transparent}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:0 8px 8px}
.mc{background:#fafafa;border-radius:7px;padding:7px;border:0.5px solid #e5e7eb}
.mcl{font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:2px}
.mci{width:100%;border:none;outline:none;font-size:15px;font-weight:700;color:#1a1a1a;padding:0;background:transparent}
.thdr{padding:7px 12px;background:#f8f9fa;border-bottom:1px solid #e5e7eb;border-top:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between}
.tname{font-size:12px;font-weight:700}
.tcnt{font-size:10px;color:#6b7280;background:#e5e7eb;padding:2px 6px;border-radius:20px}
.li-row{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid #e5e7eb;background:white;gap:5px}
.li-row.done{background:#f0fdf4}
.li-name{font-size:12px;font-weight:600;color:#1a1a1a;flex:1}
.li-det{font-size:10px;color:#6b7280;margin-top:1px}
.li-stock{font-size:10px;font-weight:600}
.qi{width:52px;padding:4px 3px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:12px;text-align:center;font-weight:700;outline:none}
.qi:focus{border-color:#0d4db5}
.qi.hq{background:#fef3c7;border-color:#fcd34d}
.sel{padding:4px 3px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:10px;outline:none;background:white;color:#1a1a1a}
.sel:focus{border-color:#0d4db5}
.pri-row{display:flex;align-items:center;padding:4px 0;border-bottom:0.5px solid #f3f4f6;gap:4px}
.pri-inp{width:68px;padding:4px 5px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:12px;text-align:right;outline:none}
.pri-inp:focus{border-color:#0d4db5}
.pri-inp.hp{background:#e8f0fe;border-color:#1a6ef5;font-weight:600}
/* PRESUPUESTO */
.bcard{background:white;border-radius:10px;padding:12px;margin-bottom:8px;border:0.5px solid #e5e7eb}
.btit{font-size:13px;font-weight:700;color:#0d4db5;margin-bottom:3px}
.bsub{font-size:11px;color:#6b7280;margin-bottom:8px}
.bbar{background:#e5e7eb;border-radius:5px;height:10px;margin:5px 0}
.bbarf{height:10px;border-radius:5px}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.bst{background:#f8f9fa;border-radius:8px;padding:8px;text-align:center}
.bstn{font-size:16px;font-weight:700}
.bstl{font-size:9px;color:#6b7280;text-transform:uppercase;margin-top:2px}
.binp{width:100%;padding:7px 10px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;outline:none;margin-bottom:6px;color:#1a1a1a}
.binp:focus{border-color:#0d4db5}
.bbtn{width:100%;padding:10px;background:#0d4db5;color:white;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
.gbtn{width:100%;padding:10px;background:#16a34a;color:white;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
.dlbtn{width:calc(100% - 16px);display:block;margin:8px;padding:10px;background:#7c3aed;color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.mtabs{display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none}
.mtabs::-webkit-scrollbar{display:none}
.mtab{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1.5px solid #e5e7eb;background:white;cursor:pointer;white-space:nowrap;color:#6b7280}
.mtab.on{background:#0d4db5;border-color:#0d4db5;color:white}
.prow{display:flex;align-items:center;padding:5px 0;border-bottom:0.5px solid #f3f4f6;gap:5px}
.prn{font-size:11px;font-weight:500;flex:1}
/* RESUMEN */
.rh{display:grid;grid-template-columns:90px repeat(7,1fr);gap:2px;padding:4px 8px;background:#f8f9fa;border-bottom:1px solid #e5e7eb;font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase}
.rr{display:grid;grid-template-columns:90px repeat(7,1fr);gap:2px;padding:5px 8px;border-bottom:1px solid #e5e7eb;align-items:center;background:white}
.rp{font-size:10px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc{text-align:center;font-size:10px;font-weight:600;color:#9ca3af}
.rc.hv{color:#0d4db5;background:#e8f0fe;border-radius:4px;padding:1px 0}
/* HISTORIAL */
.hcard{background:white;border-radius:9px;margin:7px 8px;padding:11px;border:0.5px solid #e5e7eb}
.htit{font-size:12px;font-weight:700;color:#0d4db5;margin-bottom:2px}
.hsu{font-size:10px;color:#6b7280;margin-bottom:7px}
.hi{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid #f3f4f6;font-size:10px}
.stk-main{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.stk-extra{display:flex;align-items:center;gap:3px;margin-top:2px}

function getMonday(d){const dt=new Date(d);const dw=dt.getDay();dt.setDate(dt.getDate()-dw+(dw===0?-6:1));dt.setHours(0,0,0,0);return dt;}
function wk(){return weekStart.toISOString().slice(0,10).replace(/-/g,'_');}
function sk(id){return 's_'+id;}
function dk(d,m,id){return 'd'+d+'_m'+m+'_'+id;}
function stkDisplay(id,p){
  var main=weekData[sk(id)];
  var frac=weekData['sfr_'+id]||'';
  var extra=weekData['se_'+id]||'';
  var eunit=weekData['seu_'+id]||'';
  var unit=p.u.split('-')[0].trim();
  if(!main&&!extra) return '';
  var s='';
  if(main) s+=main;
  if(frac) s+=frac;
  if(unit) s+=' '+unit;
  if(extra) s+=' + '+extra+(eunit?' '+eunit:'');
  return s;
}
function totalUsed(id){let t=0;for(let d=0;d<7;d++)for(let m=0;m<4;m++){const v=weekData[dk(d,m,id)];if(v!=null)t+=Number(v);}return t;}
function dayUsed(id,d){let t=0;for(let m=0;m<4;m++){const v=weekData[dk(d,m,id)];if(v!=null)t+=Number(v);}return t;}
function setSyncBar(msg,cls){const b=document.getElementById('syncBar');b.className='sync '+(role==='cocinera'?'sb':'sd')+' '+cls;b.textContent=msg;}
function fmtRD(n){return 'RD$ '+Number(Math.abs(n)).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtUSD(n){return '$ '+Number(Math.abs(n)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

async function saveSemName(val){
  semInfo.semName=val;
  await save('/semanaInfo/'+wk()+'/semName', val||null);
  setSyncBar('✓ Nombre guardado','sok');
}
async function changeWeek(dir){
  // Si vamos hacia adelante, copiar el stock que quedó a la semana siguiente
  if(dir>0){
    var prevWk=wk(); // semana actual ANTES de mover
    var prevData=await DB.get('/semanas/'+prevWk)||{};
    // Calcular nextWk
    var d2=new Date(weekStart);d2.setDate(d2.getDate()+7);
    var nextWk=d2.toISOString().slice(0,10);
    // Calcular lo que quedó de cada producto
    var nextData={};
    ALL_CATS.forEach(function(cat){cat.items.forEach(function(p){
      var stock=Number(prevData['s_'+p.id]||0);
      var used=0;
      for(var day=0;day<7;day++){for(var meal=0;meal<4;meal++){used+=Number(prevData['d'+day+'_m'+meal+'_'+p.id]||0);}}
      var quedo=Math.max(0,stock-used);
      if(quedo>0){
        nextData['s_'+p.id]=quedo;
        nextData['sd_'+p.id]=quedo+(p.u?' '+p.u.split('-')[0].trim():'');
      }
    });});
    // Obtener datos existentes de la semana siguiente y MERGEAR
    // (no sobreescribir lo que ya tiene, solo agregar lo que falta)
    var existing=await DB.get('/semanas/'+nextWk)||{};
    Object.keys(nextData).forEach(function(k){
      if(!existing[k]) existing[k]=nextData[k]; // solo poner si no existe
    });
    if(Object.keys(nextData).length>0){
      await DB.set('/semanas/'+nextWk, existing);
    }
  }
  var d=new Date(weekStart);
  d.setDate(d.getDate()+dir*7);
  weekStart=d;
  presMonth=d.getMonth();
  updateWkLabel();
  startPolling();
  if(role==='cocinera'){renderDayTabs('dayTabs','selDay');renderMealTabs('mealTabs','selMeal');}
  // Immediately update presupuesto label if on that panel
  var active=document.querySelector('.panel.on');
  if(active&&active.id==='pPresupuesto') renderPresupuesto();
  if(active&&active.id==='pDashboard') renderDashboard();
  if(active&&active.id==='pMenu') renderMenu();
}
function updateWkLabel(){

function getStatus(id){
  const stock=Number(weekData[sk(id)]||0);const used=totalUsed(id);
  if(stock===0&&used===0)return null;
  const rem=stock-used;const pct=stock>0?Math.min(100,Math.max(0,Math.round(rem/stock*100))):0;
  if(rem<0||pct<=10)return{type:'critico',rem,stock,used,pct};
  if(pct<=30)return{type:'bajo',rem,stock,used,pct};
  return{type:'ok',rem,stock,used,pct};
}

  const q=(document.getElementById('srchSt').value||'').toLowerCase();
  let html='',nC=0,nB=0,nO=0;
  for(const cat of ALL_CATS){

      const t=DTIENDA[p.id]||'S';
      if(stockFil==='critico'&&st.type!=='critico')continue;

// Calculate total spent from lista
var ITBIS_TIENDAS=['S','CA']; // Supermercado y Café Monte Alto cobran 14% ITBIS
function applyITBIS(pr, tienda){
  if(ITBIS_TIENDAS.indexOf(tienda)>-1) return Math.round(pr*1.14*100)/100;
  return pr; // PriceSmart y otros ya incluyen ITBIS
}
function calcListaTotal(){
  var tasa=Number(presData.tasa||60);
  var totalRD=0;
  ALL_CATS.forEach(function(cat){cat.items.forEach(function(p){
    var item=listaData[p.id]||{};
    var pti=item.ti||DTIENDA[p.id]||'S';
    // Same price lookup as downloadListaTienda
    var prObj=precios[p.id+'_'+pti]||precios[p.id+'_P']||precios[p.id+'_S']||{};
    var pr=Number(item.pr||(prObj.pr||0));
    // Cantidad actual
    var qty=Number(item.q||0);
    if(qty>0&&pr>0) totalRD+=qty*pr;
    // Viajes anteriores con +más — usar precio del viaje o fallback
    var prevCompras=item.compras||[];
    prevCompras.forEach(function(c){
      var cq=Number(c.q||0);
      var cprObj=precios[p.id+'_'+(c.t||pti)]||precios[p.id+'_P']||precios[p.id+'_S']||{};
      var cpr=Number(c.pr||(cprObj.pr||0));
      if(cq>0&&cpr>0) totalRD+=cq*cpr;
    });
  });});
  return {totalRD:totalRD,totalUSD:totalRD/tasa};
}

function filtrLista(){
  var q=(document.getElementById('srchLista')?.value||'').toLowerCase();
  document.querySelectorAll('#listaWrap .li-row').forEach(function(r){
    var name=r.querySelector('.li-name');
    r.style.display=(name&&name.textContent.toLowerCase().includes(q))?'':'none';
  });
  // Hide empty tienda headers
  document.querySelectorAll('#listaWrap .thdr').forEach(function(hdr){
    var next=hdr.nextElementSibling;
    var hasVis=false;
    while(next&&!next.classList.contains('thdr')){
      if(next.style.display!=='none')hasVis=true;
      next=next.nextElementSibling;
    }
    hdr.style.display=hasVis?'':'none';
  });
}

async function restaurarLista(){
  if(!confirm('¿Restaurar todos los productos en la lista?\nSe agregarán los que falten sin tocar los que ya tienen cantidad.')) return;
  setSyncBar('Restaurando...','sing');
  var custom=await DB.get('/customProducts')||{};
  ALL_CATS.forEach(function(cat){
    cat.items.forEach(function(p){
      var existing=listaData[p.id]||{};
      var hasData=Number(existing.q||0)>0||existing.c||(existing.compras&&existing.compras.length>0);
      if(!hasData){
        var ti=DTIENDA[p.id]||p.t||'S';
        var prObj=precios[p.id+'_'+ti]||precios[p.id+'_P']||precios[p.id+'_S']||{};
        listaData[p.id]={u:p.u,ti:ti,pr:prObj.pr||null};
      }
    });
  });
  Object.entries(custom).forEach(function(entry){
    var id=entry[0],cp=entry[1];
    var existing=listaData[id]||{};
    var hasData=Number(existing.q||0)>0||existing.c||(existing.compras&&existing.compras.length>0);
    if(!hasData){
      var ti=cp.t||'S';
      var prObj=precios[id+'_'+ti]||precios[id+'_P']||precios[id+'_S']||{};
      listaData[id]={u:cp.u,ti:ti,pr:prObj.pr||null};
    }
    DTIENDA[id]=cp.t||'S';
    var catObj=ALL_CATS.find(function(c){return c.cat===cp.cat;})||ALL_CATS[0];
    if(catObj&&!catObj.items.find(function(x){return x.id===id;})){
      catObj.items.push({id:id,n:cp.n,u:cp.u,t:cp.t||'S',custom:true});
    }
  });
  await DB.set('/lista/'+wk(), listaData);
  setSyncBar('✓ Lista restaurada — '+Object.keys(listaData).length+' productos','sok');
  renderLista();
}
async function limpiarLista(){
  var tiendas=['P','S','C','M','A','CA','MT','TODO'];
  var nombres={P:'PriceSmart',S:'Supermercado',C:'Carnicería',M:'Mercadito',A:'Almoloya',CA:'Café Monte Alto',MT:'Monte Alto',TODO:'TODAS'};
  var sel=prompt('¿Qué lista limpiar?\n1-PriceSmart\n2-Supermercado\n3-Carnicería\n4-Mercadito\n5-Almoloya\n6-Café Monte Alto\n7-Monte Alto\n8-TODAS');
  if(!sel)return;
  var t=tiendas[parseInt(sel)-1];
  if(!t){alert('Número inválido');return;}
  if(!confirm('¿Limpiar cantidades de '+nombres[t]+'? No se toca el stock.'))return;
  Object.keys(listaData).forEach(function(id){
    var pti=(listaData[id]&&listaData[id].ti)?listaData[id].ti:(DTIENDA[id]||'S');
    if(t==='TODO'||pti===t){
      delete listaData[id].q;
      delete listaData[id].c;
      delete listaData[id].compras;
    }
  });
  await DB.set('/lista/'+wk(), Object.keys(listaData).length>0?listaData:null);
  setSyncBar('✓ Lista de '+nombres[t]+' limpiada','sok');
  renderLista();
}
function borrarProductoById(id){
  var nombre='este producto';
  for(var ci=0;ci<ALL_CATS.length;ci++){var found=ALL_CATS[ci].items.find(function(x){return x.id===id;});if(found){nombre=found.n;break;}}
  borrarProducto(id,nombre);
}
async function borrarProducto(id, nombre){
  if(!confirm('¿Eliminar "'+nombre+'" del inventario?\nSe borrará del Stock, Lista y Corregir de TODAS las semanas.')) return;
  // Quitar de ALL_CATS en memoria
  for(var ci=0;ci<ALL_CATS.length;ci++){
    var fi=ALL_CATS[ci].items.findIndex(function(x){return x.id===id;});
    if(fi!==-1){ALL_CATS[ci].items.splice(fi,1);break;}
  }
  // Borrar de Firebase
  await DB.set('/customProducts/'+id, null);
  await DB.set('/editedProducts/'+id, null);
  await DB.set('/lista/'+wk()+'/'+id, null);
  await DB.set('/semanas/'+wk()+'/s_'+id, null);
  await DB.set('/semanas/'+wk()+'/sd_'+id, null);
  await DB.set('/precios/'+id+'_P', null);
  await DB.set('/precios/'+id+'_S', null);
  await DB.set('/precios/'+id+'_C', null);
  await DB.set('/precios/'+id+'_M', null);
  await DB.set('/precios/'+id+'_A', null);
  await DB.set('/precios/'+id+'_CA', null);
  // Limpiar en memoria
  delete listaData[id];
  delete weekData['s_'+id];
  delete weekData['sd_'+id];
  delete DTIENDA[id];
  setSyncBar('✓ Producto eliminado del inventario','sok');
  refreshView();
}
async function agregarMas(id){
  var cur=listaData[id]||{};
  var prevQty=Number(cur.q||0);
  var prevTienda=cur.ti||DTIENDA[id]||'S';
  var prevPr=cur.pr||null;
  var prevCompras=cur.compras||[];
  // Save current qty+tienda+price into compras so it stays in that tienda's list
  if(prevQty>0){
    prevCompras.push({q:prevQty,u:cur.u||'',t:prevTienda,pr:prevPr,fecha:new Date().toLocaleDateString('es-DO')});
  }
  // Clear qty and comprado for the NEW entry, keep compras history
  listaData[id]={...cur,q:'',c:false,compras:prevCompras};
  await save('/lista/'+wk()+'/'+id,listaData[id]);
  setSyncBar('✓ Listo — elige nueva tienda y agrega cantidad','sok');
  renderLista();
}
function addITBIS(sel){
  var pct=parseFloat(sel.value);
  if(!pct){sel.value='';return;}
  var row=sel.closest('.li-row');
  var inp=row?row.querySelector('input[data-id="'+id+'"][onchange*="onLiPr"]'):null;
  if(!inp)return;
  var base=parseFloat(inp.value)||0;
  if(!base){sel.value='';return;}
  var withTax=Math.round(base*(1+pct/100)*100)/100;
  inp.value=withTax;
  inp.style.background='#e8f0fe';
  inp.style.borderColor='#1a6ef5';
  sel.value='';
  inp.dispatchEvent(new Event('change'));
}

async function toggleLi(id){
  var cur=listaData[id]||{};
  var wasComprado=cur.c||false;
  var nowComprado=!wasComprado;
  // Keep all data, only change comprado status
  listaData[id]={...cur,c:nowComprado};
  await save('/lista/'+wk()+'/'+id,listaData[id]);

  // When marking as purchased, add quantity to stock automatically
  if(nowComprado && Number(cur.q||0)>0){
    var qty=Number(cur.q||0);
    var currentStock=Number(weekData[sk(id)]||0);
    var newStock=currentStock+qty;
    weekData[sk(id)]=newStock;
    // Also update the text stock display
    var unit=cur.u||'';
    var newStockTxt=newStock+(unit?' '+unit:'');
    weekData['sd_'+id]=newStockTxt;
    await save('/semanas/'+wk()+'/'+sk(id), newStock);
    await save('/semanas/'+wk()+'/sd_'+id, newStockTxt);
    setSyncBar('✓ Comprado — stock actualizado a '+newStock+(unit?' '+unit:''),'sok');
  } else if(!nowComprado && Number(cur.q||0)>0){
    // When unmarking, subtract from stock
    var qty2=Number(cur.q||0);
    var currentStock2=Number(weekData[sk(id)]||0);
    var newStock2=Math.max(0,currentStock2-qty2);
    weekData[sk(id)]=newStock2;
    var unit2=cur.u||'';
    weekData['sd_'+id]=newStock2+(unit2?' '+unit2:'');
    await save('/semanas/'+wk()+'/'+sk(id), newStock2||null);

function renderResumen(){
  const q=(document.getElementById('srchRes').value||'').toLowerCase();
  let html='';
  for(const cat of ALL_CATS){
    const items=cat.items.filter(p=>p.n.toLowerCase().includes(q));
    if(!items.length)continue;
    let ch='';
    for(const p of items){
      let cells='',has=false;
      for(let d=0;d<7;d++){const v=dayUsed(p.id,d);if(v>0)has=true;cells+=`<div class="rc${v>0?' hv':''}">${v>0?v:'—'}</div>`;}
      if(!has)continue;
      ch+=`<div class="rr"><div class="rp" title="${p.n}">${p.n}</div>${cells}</div>`;
    }
    if(ch)html+=`<div class="cat">${cat.cat}</div>${ch}`;
  }
  document.getElementById('resList').innerHTML=html||'<div class="empty"><div class="ei">📅</div><div class="et">Sin movimientos</div></div>';

async function cerrarSemanaYCarrySobrante(){
  // Calculate Ramona's leftover and carry to next week
  var tot=calcListaTotal();
  var gastado=tot.totalRD;
  var ramBudget=Number(semInfo.ramBudget||0);
  var sobrante=Math.max(0,ramBudget-gastado);
  // Save this week's spending to presupuesto
  var mesKey='gasto_sem_'+wk();
  presData[mesKey]=gastado;
  await save('/presupuesto/'+mesKey,gastado||null);
  // Carry leftover to next week
  if(sobrante>0){
    var d2=new Date(weekStart);d2.setDate(d2.getDate()+7);
    var nextWk=d2.toISOString().slice(0,10).replace(/-/g,'_');
    var nextSemInfo=await DB.get('/semanaInfo/'+nextWk)||{};
    var nextBudget=Number(nextSemInfo.ramBudget||0)+sobrante;
    await save('/semanaInfo/'+nextWk+'/ramBudget', nextBudget);
    alert('✅ Semana cerrada.\nSobrante de Ramona: '+fmtRD(sobrante)+'\nSe sumó al presupuesto de la semana siguiente: '+fmtRD(nextBudget));
  } else {
    alert('✅ Semana cerrada.\nNo hubo sobrante de Ramona.');
  }
  setSyncBar('✓ Semana cerrada — sobrante pasado a siguiente semana','sok');
  renderPresupuesto();
}
async function onPrEdit(el){
  var id=el.dataset.id;var t=el.dataset.t||'P';var v=el.value;
  var key=id+'_'+t;
  var prFinal=v===''?null:Number(v);
  if(!precios[key])precios[key]={};
  if(v===''){delete precios[key].pr;}else{precios[key].pr=prFinal;}
  await save('/precios/'+key,precios[key]);
  el.style.background=v?'#e8f0fe':'white';
  el.style.borderColor=v?'#1a6ef5':'#e5e7eb';
  if(listaData[id]){
    var pti=listaData[id].ti||DTIENDA[id]||'S';
    if(pti===t){
      listaData[id]={...listaData[id],pr:prFinal};
      await save('/lista/'+wk()+'/'+id,listaData[id]);
    }
  }
  setSyncBar('✓ Precio guardado','sok');
  renderPresupuesto();
}

function filPr(){
  const q=(document.getElementById('srchPr')?.value||'').toLowerCase();
  document.querySelectorAll('#prList .prow').forEach(r=>{r.style.display=(r.dataset.n||'').includes(q)?'':'none';});

async function guardarSemana(){
  const end=new Date(weekStart);end.setDate(end.getDate()+6);
  const fmt=dt=>dt.toLocaleDateString('es-DO',{day:'numeric',month:'short',year:'numeric'});
  const semLabel=semInfo.semName||fmt(weekStart)+' — '+fmt(end);
  const {totalRD}=calcListaTotal();
  const tasa=Number(presData.tasa||60);
  const semLabel2=semInfo.semName||fmt(weekStart)+' — '+fmt(end);
  const snap={
    semana:semLabel2,
    fecha:new Date().toLocaleDateString('es-DO',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    totalGastoRD:totalRD,totalGastoUSD:totalRD/tasa,tasa,
    resumen:{}
  };
  ALL_CATS.forEach(cat=>cat.items.forEach(p=>{
    const stock=Number(weekData[sk(p.id)]||0);const used=totalUsed(p.id);
    const item=listaData[p.id]||{};
    const qty=Number(item.q||0);const pr=Number(item.pr||precios[p.id]||0);
    if(stock>0||used>0||qty>0)
      snap.resumen[p.id]={n:p.n,u:p.u,stock,usado:used,quedo:Math.max(0,stock-used),comprado:qty,precio:pr,costo:qty*pr};
  }));
  await DB.push('/historial',snap);
  alert('✅ Semana guardada en el historial correctamente.');
}

    const entries=Object.entries(hist).reverse();
    let html=`<button class="dlbtn" onclick="downloadHistorial()">⬇️ Descargar historial completo</button>
    <button onclick="clearWeekData()" style="display:block;width:calc(100% - 16px);margin:0 8px 8px;padding:10px;background:#dc2626;color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">🗑 Borrar datos de semana actual</button>`;
    for(const [key,e] of entries){
      let items='',nU=0,nA=0;
      for(const v of Object.values(e.resumen||{})){
        if(v.usado>0||v.comprado>0){
          items+=`<div class="hi">
            <span>${v.n}</span>
            <span style="color:#6b7280;font-size:10px">
              ${v.stock>0?'Stock: '+v.stock+' · ':''}
              ${v.usado>0?'Usado: '+v.usado+' · ':''}
              ${v.quedo>0?'Quedó: '+v.quedo:v.usado>0?'<span style=color:#dc2626>Agotado</span>':''}
              ${v.comprado>0?'· Comprado: '+v.comprado+' '+v.u:''}
              ${v.costo>0?'· '+fmtRD(v.costo):''}
            </span>
          </div>`;
          nU++;if(v.quedo<=0&&v.usado>0)nA++;
        }
      }
      const gastoTxt=e.totalGastoRD>0?` · Gasto: ${fmtRD(e.totalGastoRD)} (${fmtUSD(e.totalGastoUSD||0)})`:'';
      html+=`<div class="hcard">
        <div class="htit">📅 ${e.semana}</div>
        <div class="hsu">Guardado: ${e.fecha}${gastoTxt}${nA>0?' · ⚠ '+nA+' agotados':''}</div>
        ${items||'<div style="font-size:11px;color:#9ca3af">Sin movimientos</div>'}
      </div>`;
    }
    el.innerHTML=html;
  }catch(e){el.innerHTML='<div class="empty"><div class="ei">⚠️</div><div class="et">Error al cargar</div></div>';}
}

async function clearWeekData(){
  if(!confirm('¿Borrar TODOS los datos de esta semana? Esto no se puede deshacer.')) return;

  await DB.set('/lista/'+wk(), null);

  setSyncBar('✓ Semana borrada','sok');
  refreshView();
  alert('Datos de la semana borrados correctamente.');
}

function downloadListaTienda(tienda){
  var tFull={P:'PriceSmart',S:'Supermercado',C:'Carniceria',M:'Mercadito',A:'Almoloya',CA:'Cafe Monte Alto',MT:'Monte Alto'};
  var tEmoji={P:'🔵',S:'🟢',C:'🔴',M:'🟡',A:'💧',CA:'☕',MT:'🏔'};
  var semName=semInfo.semName||wk();
  var tasa=Number(presData.tasa||60);
  var prods=[];
  ALL_CATS.forEach(function(cat){
    cat.items.forEach(function(p){
      var item=listaData[p.id]||{};
      var pti=item.ti||(DTIENDA[p.id]||'S');
      var prObj=precios[p.id+'_'+tienda]||precios[p.id+'_P']||precios[p.id+'_S']||{};
      var pr=Number(item.pr||(prObj.pr||0));
      // Cantidad actual en esta tienda (pendiente o comprado)
      if(pti===tienda&&Number(item.q||0)>0){
        prods.push({n:p.n,u:item.u||p.u,qty:Number(item.q),pr:pr,cost:Number(item.q)*pr,done:item.c||false,cat:cat.cat});
      }
      // Viajes anteriores via +más (guardados en compras[])
      (item.compras||[]).forEach(function(c){
        if((c.t||'S')===tienda&&Number(c.q||0)>0){
          var cpr=Number(c.pr||(prObj.pr||0));
          prods.push({n:p.n,u:c.u||item.u||p.u,qty:Number(c.q),pr:cpr,cost:Number(c.q)*cpr,done:true,cat:cat.cat,nota:'anterior'});
        }
      });
    });
  });
  if(!prods.length){alert('No hay productos con cantidad para '+tFull[tienda]);return;}
  var total=prods.reduce(function(s,p){return s+p.cost;},0);
  var pend=prods.filter(function(p){return !p.done;});
  var comp=prods.filter(function(p){return p.done;});

  var html='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">';
  html+='<title>Lista '+tFull[tienda]+'</title>';
  html+='<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f2f5;padding:12px}';
  html+='.hdr{background:#0d4db5;color:white;padding:14px 16px;border-radius:12px;margin-bottom:12px}';
  html+='.htitle{font-size:18px;font-weight:800;margin-bottom:2px}.hsub{font-size:11px;opacity:0.85}';
  html+='.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}';
  html+='.stat{background:white;border-radius:10px;padding:10px;text-align:center;border:0.5px solid #e5e7eb}';
  html+='.sn{font-size:20px;font-weight:800;color:#0d4db5}.sl{font-size:10px;color:#6b7280;text-transform:uppercase;margin-top:2px}';
  html+='.cat{background:#e8f0fe;padding:7px 12px;font-size:10px;font-weight:700;color:#0d4db5;text-transform:uppercase;letter-spacing:0.05em;border-radius:6px;margin:8px 0 4px}';
  html+='.item{display:flex;align-items:center;background:white;border-radius:8px;padding:10px 12px;margin-bottom:4px;gap:10px;border:0.5px solid #e5e7eb}';
  html+='.item.done{background:#f0fdf4;opacity:0.6}.chk{width:28px;height:28px;border:2px solid #e5e7eb;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;background:white}';
  html+='.chk.on{background:#16a34a;border-color:#16a34a;color:white}';
  html+='.iname{flex:1;font-size:13px;font-weight:600}.idet{font-size:11px;color:#6b7280;margin-top:1px}';
  html+='.icost{font-size:12px;font-weight:700;color:#0d4db5;white-space:nowrap}';
  html+='.total{background:#0d4db5;color:white;padding:12px 16px;border-radius:10px;margin-top:12px;display:flex;justify-content:space-between;align-items:center}';
  html+='@media print{.no-print{display:none}}</style></head><body>';

  html+='<div class="hdr"><div class="htitle">'+tEmoji[tienda]+' '+tFull[tienda]+'</div>';
  html+='<div class="hsub">Semana: '+semName+' · Generado: '+new Date().toLocaleDateString('es-DO',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+'</div></div>';

  html+='<div class="stats">';
  html+='<div class="stat"><div class="sn">'+prods.length+'</div><div class="sl">Productos</div></div>';
  html+='<div class="stat"><div class="sn">'+pend.length+'</div><div class="sl">Pendientes</div></div>';
  html+='<div class="stat"><div class="sn">'+comp.length+'</div><div class="sl">Comprados</div></div>';
  html+='</div>';

  // Group by category
  var cats={};
  prods.forEach(function(p){if(!cats[p.cat])cats[p.cat]=[];cats[p.cat].push(p);});

  Object.keys(cats).forEach(function(cat){
    html+='<div class="cat">'+cat+'</div>';
    cats[cat].forEach(function(p){
      html+='<div class="item'+(p.done?' done':'')+'" style="cursor:pointer" onclick="var c=this.querySelector(\'.chk\');c.classList.toggle(\'on\');this.classList.toggle(\'done\')">';
      html+='<div class="chk'+(p.done?' on':'')+'">'+(p.done?'✓':'')+'</div>';
      html+='<div style="flex:1"><div class="iname"'+(p.done?' style="text-decoration:line-through"':'')+'>'+p.n+'</div>';
      html+='<div class="idet">'+p.qty+' '+p.u+(p.pr?(' · RD$ '+p.pr.toLocaleString('es-DO')):'')+'</div></div>';
      html+='<div class="icost">'+(p.cost>0?fmtRD(p.cost):'')+'</div>';
      html+='</div>';
    });
  });

  if(total>0){
    html+='<div class="total"><span style="font-size:14px;font-weight:700">Total estimado</span>';
    html+='<div style="text-align:right"><div style="font-size:20px;font-weight:800">'+fmtRD(total)+'</div>';
    html+='<div style="font-size:11px;opacity:0.85">'+fmtUSD(total/tasa)+'</div></div></div>';
  }

  html+='<button onclick="window.print()" class="no-print" style="display:block;width:100%;margin-top:12px;padding:12px;background:#374151;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">🖨 Imprimir / Guardar PDF</button>';
  html+='</body></html>';

  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='Lista_'+tFull[tienda]+'_'+semName.replace(/[^a-zA-Z0-9]/g,'_')+'.html';
  a.click();
  URL.revokeObjectURL(url);
}

async function saveNewProduct(){
  var nombre=document.getElementById('npNombre').value.trim();
  var unidad=document.getElementById('npUnidad').value;
  var cat=document.getElementById('npCat').value;
  var tienda=document.getElementById('npTienda').value;
  if(!nombre){alert('Escribe el nombre del producto');return;}
  var id='custom_'+Date.now();
  DTIENDA[id]=tienda;
  // Save to Firebase
  await DB.set('/customProducts/'+id,{n:nombre,u:unidad,t:tienda,cat:cat});
  listaData[id]={u:unidad,ti:tienda,pr:null};
  await DB.set('/lista/'+wk()+'/'+id,listaData[id]);
  // Add to ALL_CATS only once
  var alreadyIn=ALL_CATS.some(function(c){return c.items.some(function(p){return p.id===id;});});
  if(!alreadyIn){
    var catObj=ALL_CATS.find(function(c){return c.cat===cat;});
    if(catObj) catObj.items.push({id:id,n:nombre,u:unidad,t:tienda,custom:true});
  }
  document.getElementById('addProdModal').style.display='none';
  alert('✅ Producto "'+nombre+'" agregado correctamente.');
  renderLista();
}

async function loadCustomProducts(){
  try{
    var custom=await DB.get('/customProducts');
    if(!custom)return;
    // Build flat set of existing IDs to prevent duplicates
    var existingIds=new Set();
    ALL_CATS.forEach(function(cat){cat.items.forEach(function(p){existingIds.add(p.id);});});
    Object.entries(custom).forEach(function(entry){
      var id=entry[0],p=entry[1];
      DTIENDA[id]=p.t||'S';
      if(!existingIds.has(id)){
        var catObj=ALL_CATS.find(function(c){return c.cat===p.cat;})||ALL_CATS[0];
        if(catObj){
          catObj.items.push({id:id,n:p.n,u:p.u,t:p.t||'S',custom:true});
          existingIds.add(id);
        }
      }
    });
  }catch(e){}
}

function calcEst(items, personas){
  var result=[];
  items.forEach(function(item){
    var nombre=item[0],ppp=item[1],unit=item[2];
    var total=personas*ppp;
    var qty;
    if(unit==='lb'||unit==='galón') qty=Math.round(total*10)/10;
    else qty=Math.ceil(total);
    if(qty>0) result.push({n:nombre,q:qty,u:unit});
  });
  return result;
}

async function copiarStockSiguiente(){
  if(!confirm('¿Copiar el stock restante de esta semana a la semana siguiente?\nEsto sobreescribirá el stock inicial de la semana siguiente.')) return;
  var prevWk=wk();
  var prevData=await DB.get('/semanas/'+prevWk)||{};
  var d2=new Date(weekStart);d2.setDate(d2.getDate()+7);
  var nextWk=d2.toISOString().slice(0,10).replace(/-/g,'_');
  var nextData={};
  var count=0;
  ALL_CATS.forEach(function(cat){cat.items.forEach(function(p){
    var stock=Number(prevData['s_'+p.id]||0);
    var used=0;
    for(var day=0;day<7;day++){for(var meal=0;meal<4;meal++){used+=Number(prevData['d'+day+'_m'+meal+'_'+p.id]||0);}}
    var quedo=Math.max(0,stock-used);
    if(quedo>0){
      nextData['s_'+p.id]=quedo;
      nextData['sd_'+p.id]=quedo+(p.u?' '+p.u.split('-')[0].trim():'');
      count++;
    }
  });});
  if(count===0){alert('No hay stock restante para copiar.');return;}
  var existing=await DB.get('/semanas/'+nextWk)||{};
  Object.keys(nextData).forEach(function(k){existing[k]=nextData[k];});
  await DB.set('/semanas/'+nextWk, existing);
  setSyncBar('✓ Stock copiado a semana '+nextWk+' ('+count+' productos)','sok');
  alert('✅ Stock copiado correctamente a la semana '+nextWk+'\n'+count+' productos con stock restante.');
}

      Object.values(e.resumen||{}).forEach(v=>{
        if(v.usado>0||v.comprado>0){
          csv+='"'+e.semana+'","'+e.fecha+'","'+v.n+'","'+v.u+'",'+( v.stock||0)+','+(v.usado||0)+','+(v.quedo||0)+','+(v.comprado||0)+','+(v.precio||0)+','+(v.costo||0)+','+((v.costo||0)/tasa).toFixed(2)+'\n';
        }
      });
    });
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='historial_cocina_MOH.csv';a.click();
    URL.revokeObjectURL(url);
  });
}
</script>
